# OpenOCD config for ST Nucleo-H743ZI2 (STM32H743ZI)
# 透過板載 ST-Link v3 使用 SWD 介面

source [find interface/stlink.cfg]
transport select hla_swd

source [find target/stm32h7x.cfg]

# 允許不 reset 就連線（Attach 模式需要）
reset_config srst_nogate connect_deassert_srst

# 增加 SWD 時脈速度以加快 Flash 燒錄
adapter speed 4000
